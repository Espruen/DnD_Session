name: DND Github Action
run-name: ${{ github.actor }} Invaiding The Repo!!!
on: 
  [push]
jobs:
  Check-Inventory:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Current Job = ${{ github.job }}"
          echo "Repo Owner = ${{ github.repository_owner }}"
          echo "GitHub Event = ${{ github.event_name }}"
          echo "OS = ${{ runner.os }} server hosted by GitHub!"
          echo "Repository = ${{ github.repository }}"
          echo "Branch Name = ${{ github.ref }}"
          echo "Reference Name = ${{ github.ref_name }}"
          echo "Actor = ${{ github.actor }}"

      - name: Check out repository code
        uses: actions/checkout@v6

      - name: List files in the repository
        run: |
          tree ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
      - run: env > environment.txt

      - name: Create Environment Artifact
        uses: actions/upload-artifact@v7
        with:
          name: environment
          path: environment.txt


  Preparing-Spell:
      runs-on: ubuntu-latest
      outputs:
        l_summary: ${{ steps.latest_variables.outputs.LATEST_SUMMARY }}
        l_log: ${{ steps.latest_variables.outputs.LATEST_LOG }}
        l_session: ${{ steps.latest_variables.outputs.SESSION_NUMBER }}

        
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v6

        - name: Set Environment Variables
          id: latest_variables
          run: |
              LATEST_SUMMARY=$( ls -1r "${{ github.workspace }}/summary/"| head -n1 )
              LATEST_ADV_LOG=$( ls -1r "${{ github.workspace }}/adv_log/"| head -n1 )
              SESSION_NUMBER=$( ls -1r "${{ github.workspace }}/sessions/" | head -n1 | sed 's/[^0-9]//g' )
              echo "LATEST_SUMMARY=${LATEST_SUMMARY}" >> "$GITHUB_OUTPUT"
              echo "LATEST_LOG=${LATEST_ADV_LOG}" >> "$GITHUB_OUTPUT"
              echo "SESSION_NUMBER=${SESSION_NUMBER}" >> "$GITHUB_OUTPUT"

        - name: Output Variables
          run: |
            echo "LATEST_SUMMARY"
            echo "LATEST_LOG"
            echo "SESSION_NUMBER"


  Cast-Spell:
      runs-on: ubuntu-latest
      needs:
        "Preparing-Spell"
      steps:
        - name: Current Job
          run: echo  "${{ github.job }}"
        
        - name: Check out repository
          uses: actions/checkout@v6
          
        - name: Download and Unzip DnD Template
          run: | 
            curl -OL https://github.com/rpgtex/DND-5e-LaTeX-Template/archive/master.zip
            unzip master.zip
        
        - name: Edit Main for Session Build
          run: |
            sed -i "s|\input{Last_Adventure}|\input{summary/${{ needs.Preparing-Spell.outputs.l_summary }}}|g" main.tex
            sed -i "s|\input{Adventure_Log}|\input{adv_log/${{ needs.Preparing-Spell.outputs.l_log }}}|g" main.tex
            sed -i "s|\part\*{Latest_Session}|\part\*{Session ${{ needs.Preparing-Spell.outputs.l_session }}}|g" main.tex


        - name: Generate PDF document
          uses: xu-cheng/latex-action@v3
          with: 
            root_file: main.tex
          env:
            TEXINPUTS: ".:./DND-5e-LaTeX-Template-stable//:"
            
        - name: Create Artifact
          uses: actions/upload-artifact@v7
          with:
            name: Session_${{ needs.Preparing-Spell.outputs.l_session }}
            path: main.pdf

            
            
        
  
          

